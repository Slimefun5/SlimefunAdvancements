name: Build

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'src/**'
      - 'build.gradle.kts'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4.6.0
      with:
        java-version: '25'
        distribution: 'oracle'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Build with Gradle
      run: ./gradlew build
